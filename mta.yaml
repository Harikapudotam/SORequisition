_schema-version: 3.3.0
ID: SORequisition
description: A simple CAP project.
version: 1.0.0
modules:
  - name: SORequisition-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: SORequisition-db
      - name: SORequisition-connectivity
      - name: SORequisition-destination
      - name: SORequisition-auth
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: SORequisition-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: SORequisition-db
    parameters:
      buildpack: nodejs_buildpack
  - name: SORequisition-destination-content
    type: com.sap.application.content
    requires:
      - name: SORequisition-destination
        parameters:
          content-target: true
      - name: SORequisition_html_repo_host
        parameters:
          service-key:
            name: SORequisition_html_repo_host-key
      - name: SORequisition-auth
        parameters:
          service-key:
            name: SORequisition-auth-key
    parameters:
      content:
        instance:
          destinations:
            - Name: soreq_SORequisition_html_repo_host
              ServiceInstanceName: SORequisition-html5-app-host-service
              ServiceKeyName: SORequisition_html_repo_host-key
              sap.cloud.service: soreq
            - Authentication: OAuth2UserTokenExchange
              Name: soreq_SORequisition_auth
              ServiceInstanceName: SORequisition-auth
              ServiceKeyName: SORequisition-auth-key
              sap.cloud.service: soreq
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: SORequisition-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: SORequisition_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - ustsosoreq.zip
          name: ustsosoreq
          target-path: resources/
  - name: ustsosoreq
    type: html5
    path: app/soreq
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: SORequisition-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: SORequisition-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: SORequisition-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: SORequisition-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: SORequisition-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: SORequisition_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: SORequisition-html5-app-host-service
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
